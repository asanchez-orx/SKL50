<!-- Modal de Selección de Módulo y Servicio -->
<div class="modal-overlay" *ngIf="showSelectionModal" (click)="closeSelectionModal()">
  <div class="selection-modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <button type="button" class="modal-close-btn" (click)="closeSelectionModal()"
        *ngIf="selectionData.modulo && selectionData.servicio">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path
            d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
        </svg>
      </button>
      <h2>Configuración de Sesión</h2>
      <p>Selecciona tu ubicación de trabajo actual</p>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label>Módulo</label>
        <select [(ngModel)]="selectionData.modulo" name="modulo">
          <option value="" disabled selected>Selecciona un módulo</option>
          <option *ngFor="let m of modulos" [value]="m">{{ m }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>Servicio</label>
        <select [(ngModel)]="selectionData.servicio" name="servicio">
          <option value="" disabled selected>Selecciona un servicio</option>
          <option *ngFor="let s of servicios" [value]="s">{{ s }}</option>
        </select>
      </div>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn-confirm" [disabled]="!selectionData.modulo || !selectionData.servicio"
        (click)="confirmSelection()">
        Confirmar e Ingresar
      </button>
    </div>
  </div>
</div>

<div class="home-layout">
  <!-- Top Header -->
  <header class="home-header">
    <div class="header-left">
      <!-- Toggle Sidebar Button -->
      <button type="button" class="menu-toggle" (click)="toggleSidebar()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
        </svg>
      </button>
      <div class="logo-container">
        <img src="assets/images/logo_skl50_banner.png" alt="Logo SKL50" class="logo">
      </div>
    </div>

    <!-- Información de Sesión (Centro) -->
    <div class="header-center" *ngIf="!showSelectionModal">
      <div class="session-display" (click)="openSelectionModal()" title="Click para cambiar módulo/servicio">
        <span class="session-text">{{ selectionData.modulo }} / {{ selectionData.servicio }}</span>
      </div>
    </div>

    <div class="header-right">
      <div class="user-profile">
        <span class="username">{{ username }}</span>
        <div class="avatar">
          <!-- Simple user icon -->
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path
              d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
          </svg>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Body Content (Sidebar + Content Area) -->
  <div class="home-body">
    <!-- Left Sidebar -->
    <aside class="sidebar" [class.collapsed]="isSidebarCollapsed">
      <nav class="sidebar-nav">
        <ul>
          <li *ngFor="let item of menuItems">
            <a [routerLink]="item.route" routerLinkActive="active" class="nav-item">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path [attr.d]="item.icon"></path>
              </svg>
              <span>{{ item.label }}</span>
            </a>
          </li>

          <!-- Cerrar Sesión Button at bottom -->
          <li class="logout-item">
            <a routerLink="/login" (click)="logout()" class="nav-item text-danger">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path
                  d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z" />
              </svg>
              <span>Cerrar sesión</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- Main Content Area where child routes (planos) will be rendered -->
    <main class="main-content">
      <div class="content-wrapper">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

  <!-- Footer Inferior -->
  <footer class="home-footer">
    <!-- Espaciador para centrar el branding -->
    <div class="footer-section left"></div>

    <div class="footer-section center">
      <span>Powered by cltech</span>
      <span class="footer-version">v2.0.0</span>
    </div>

    <div class="footer-section right" title="Tiempo de gestión actual">
      <div class="timer-badge">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor" class="timer-icon">
          <path
            d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z" />
          <path d="M12.5 7H11v6l5.25 3.15.75-1.23-4.5-2.67z" />
        </svg>
        <span>{{ sessionTime }}</span>
      </div>
    </div>
  </footer>
</div>
