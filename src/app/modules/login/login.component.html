<div class="login-container">

  <!-- Left Side: Carousel -->
  <div class="carousel-section">
    <div class="carousel-wrapper">
      <div *ngFor="let slide of slides; let i = index" class="slide" [class.active]="i === currentSlide"
        [style.backgroundImage]="'url(' + slide.image + ')'">
      </div>
    </div>
  </div>

  <!-- Right Side: Login Form -->
  <div class="form-section">
    <div class="login-card">
      <div class="login-header">
        <button class="logo-wrapper clickable" (click)="openConfigModal()" type="button">
          <img src="/SKL50.png" alt="Logo SKL50" class="logo">
        </button>
        <h1>Inicio de sesión</h1>
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">


        <div class="form-group">
          <label for="username">Usuario</label>
          <div class="input-wrapper">
            <input type="text" id="username" name="username" [(ngModel)]="loginData.username" required
              placeholder="Ingresa tu usuario" (input)="onUsernameInput($event)" (blur)="onUsernameBlur($event)">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <input type="password" id="password" name="password" [(ngModel)]="loginData.password" required
              placeholder="••••••••">
          </div>
        </div>

        <div class="form-group">
          <label for="sede">Sede</label>
          <div class="input-wrapper">
            <select id="sede" name="sede" [(ngModel)]="loginData.sede" required
              [disabled]="!loginData.username || !loginData.password">
              <option value="" disabled selected>Selecciona tu sede</option>
              <option *ngFor="let sede of sedes" [value]="sede.Id">{{ sede.Nombre }}</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn-login" [disabled]="!loginData.sede || isLoggingIn">
          {{ isLoggingIn ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
        </button>
      </form>

      <div class="version-info">
        Versión 2.0.0
      </div>
    </div>
  </div>

  <!-- Configuration Modal -->
  <div class="modal-overlay" *ngIf="showConfigModal" (click)="closeConfigModal()" style="z-index: 10000 !important;">
    <div class="modal-content glass" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>Configuración</h2>
        <button class="close-btn" (click)="closeConfigModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="wsIp">IP Servidor WebServices</label>
          <div class="input-wrapper">
            <input type="text" id="wsIp" [(ngModel)]="tempConfig.wsIp" placeholder="Ej: 192.168.1.10">
          </div>
        </div>

        <div class="radio-groups">
          <div class="form-group radio-group">
            <label>Impresora</label>
            <div class="input-wrapper">
              <select id="impresora" name="impresora" [(ngModel)]="tempConfig.usaImpresora">
                <option [ngValue]="true">Sí</option>
                <option [ngValue]="false">No</option>
              </select>
            </div>
          </div>

          <div class="form-group radio-group">
            <label>Puertos COM</label>
            <div class="input-wrapper">
              <select id="puertos" name="puertos" [(ngModel)]="tempConfig.usaPuertosCom">
                <option [ngValue]="true">Sí</option>
                <option [ngValue]="false">No</option>
              </select>
            </div>
          </div>

          <div class="form-group radio-group">
            <label>Tipo de impresión</label>
            <div class="input-wrapper">
              <select id="tipoImpresion" name="tipoImpresion" [(ngModel)]="tempConfig.usaTipoImpresion">
                <option [ngValue]="true">Sí</option>
                <option [ngValue]="false">No</option>
              </select>
            </div>
          </div>

          <div class="form-group radio-group">
            <label>Pantallas</label>
            <div class="input-wrapper">
              <select id="pantallas" name="pantallas" [(ngModel)]="tempConfig.usaPantallas">
                <option [ngValue]="true">Sí</option>
                <option [ngValue]="false">No</option>
              </select>
            </div>
          </div>

          <div class="form-group switch-group">
            <label>Calificación del servicio</label>
            <div class="input-wrapper switch-wrapper">
              <label class="switch">
                <input type="checkbox" name="calificacion" 
                  [ngModel]="tempConfig.usaCalificacionServicio === 1" 
                  (ngModelChange)="tempConfig.usaCalificacionServicio = $event ? 1 : 0">
                <span class="slider round"></span>
              </label>
              <span class="switch-label">{{ tempConfig.usaCalificacionServicio === 1 ? 'Sí' : 'No' }}</span>
            </div>
          </div>

          <div class="form-group switch-group">
            <label>Consentimiento informado</label>
            <div class="input-wrapper switch-wrapper">
              <label class="switch">
                <input type="checkbox" name="consentimiento" 
                  [ngModel]="tempConfig.usaConsentimientoInformado === 1" 
                  (ngModelChange)="tempConfig.usaConsentimientoInformado = $event ? 1 : 0">
                <span class="slider round"></span>
              </label>
              <span class="switch-label">{{ tempConfig.usaConsentimientoInformado === 1 ? 'Sí' : 'No' }}</span>
            </div>
          </div>
        </div>
        <small>Esta configuración se guardará globalmente.</small>

      </div>
      <div class="modal-footer">
        <button class="btn-cancel" (click)="closeConfigModal()">Cancelar</button>
        <button class="btn-save" (click)="saveConfig()">Guardar Cambios</button>
      </div>
    </div>
  </div>
</div>
